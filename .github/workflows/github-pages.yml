# Build quarto/presentation.qmd with Pixi and deploy static output to GitHub Pages.
# After the first run: Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.

name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.10
        with:
          cache: true

      - name: Render presentation
        env:
          MPLBACKEND: Agg
        run: |
          pixi install --frozen
          pixi run render

      - name: Stage site (index + assets)
        run: |
          mkdir -p _site
          cp quarto/presentation.html _site/index.html
          cp -r quarto/presentation_files _site/
          if [ -d quarto/images ]; then cp -r quarto/images _site/; fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
