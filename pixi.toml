[workspace]
authors = ["Tyler Erickson <tyler@vorgeo.com>"]
channels = ["conda-forge"]
name = "LDP-Hackday"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[tasks]
preview = "quarto preview quarto/presentation.qmd"
render = "quarto render quarto/presentation.qmd"

[dependencies]
quarto = ">=1.8.27,<2"
jupyter = ">=1.1.1,<2"
xarray = ">=2026.2.0,<2027"
zarr = ">=3.0.4"
fsspec = ">=2026.3.0,<2027"
requests = ">=2.33.1,<3"
aiohttp = ">=3.13.5,<4"
matplotlib = ">=3.10.8,<4"
